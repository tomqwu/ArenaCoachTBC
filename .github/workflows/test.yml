name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lua-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua 5.1 + luarocks
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install luacov

      - name: Syntax-check every .lua file
        run: |
          cd ArenaCoachTBC
          fail=0
          for f in $(find . -name '*.lua'); do
            if ! luac5.1 -p "$f"; then echo "SYNTAX FAIL: $f"; fail=1; fi
          done
          exit $fail

      - name: Locale parity gate
        run: lua5.1 tools/check_locales.lua

      - name: Run test suite with coverage
        run: |
          rm -f luacov.stats.out luacov.report.out
          lua5.1 -lluacov ArenaCoachTBC/Tests/run_all.lua
          luacov

      - name: Run standalone strategy smoke spec
        run: lua5.1 ArenaCoachTBC/Tests/StrategyEngine_spec.lua

      - name: Enforce minimum coverage (99%)
        run: |
          total=$(grep -E '^Total' luacov.report.out | awk '{print $NF}' | tr -d '%')
          echo "Coverage: $total%"
          awk -v t="$total" 'BEGIN { if (t+0 < 99.0) { print "Coverage below 99%"; exit 1 } }'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: luacov-report
          path: |
            luacov.report.out
            luacov.stats.out

  # v2.6.0: LuaJIT 2.1 compatibility gate. The Lua 5.1 job above is the
  # primary (TBC client uses Lua 5.1 exclusively, so it's the contract
  # we ship against), but the engine is portable enough that LuaJIT 2.1
  # also runs the full suite. A regression here means we used a 5.1-only
  # construct that LuaJIT would reject — typically nothing, but caches
  # are cheap and a regression catch is worth the runner minutes.
  luajit-tests:
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't block PRs on LuaJIT-only regressions
    steps:
      - uses: actions/checkout@v4

      - name: Install LuaJIT 2.1
        run: |
          sudo apt-get update
          sudo apt-get install -y luajit
          luajit -v

      - name: Syntax-check every .lua file
        run: |
          cd ArenaCoachTBC
          fail=0
          for f in $(find . -name '*.lua'); do
            if ! luajit -bl "$f" > /dev/null 2>&1; then echo "SYNTAX FAIL: $f"; fail=1; fi
          done
          exit $fail

      - name: Locale parity gate
        run: luajit tools/check_locales.lua

      - name: Run test suite
        run: luajit ArenaCoachTBC/Tests/run_all.lua
