name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build + publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version + tag
        id: v
        run: |
          set -euo pipefail
          base=$(grep '^## Version:' ArenaCoachTBC/ArenaCoachTBC.toc | awk '{print $3}')
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            kind="release"
            prerelease="false"
          else
            tag="v${base}-dev.${GITHUB_RUN_NUMBER}"
            kind="dev"
            prerelease="true"
          fi
          echo "tag=$tag"             >> "$GITHUB_OUTPUT"
          echo "kind=$kind"           >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$tag kind=$kind prerelease=$prerelease"

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          if [[ "${{ steps.v.outputs.kind }}" == "release" ]]; then
            version_no_v="${{ steps.v.outputs.tag }}"
            version_no_v="${version_no_v#v}"
            awk -v ver="$version_no_v" '
              $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
              flag && /^## \[/         { flag = 0 }
              flag                     { print }
            ' CHANGELOG.md > /tmp/notes.md
          else
            awk '
              /^## \[Unreleased\]/ { flag = 1; next }
              flag && /^## \[/     { flag = 0 }
              flag                 { print }
            ' CHANGELOG.md > /tmp/notes.md
          fi
          if [[ ! -s /tmp/notes.md ]]; then
            printf '_No notes found in CHANGELOG.md - commit summary:_\n\n%s\n' \
              "$(git log -1 --pretty=format:'%s%n%n%b')" > /tmp/notes.md
          fi
          {
            echo ""
            echo "### How to test"
            echo ""
            echo "1. Download \`ArenaCoachTBC-${{ steps.v.outputs.tag }}.zip\` below."
            echo "2. Extract into \`<WoW>/_classic_/Interface/AddOns/\`."
            echo "3. \`/reload\` in-game, then \`/acc help\` to see commands."
            echo "4. \`/acc selftest\` for in-client validation."
          } >> /tmp/notes.md
          echo "--- Resolved notes ---"
          cat /tmp/notes.md

      - name: Create and push dev tag
        if: steps.v.outputs.kind == 'dev'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Tag might already exist from a previous failed run; tolerate that.
          git tag "${{ steps.v.outputs.tag }}" "$GITHUB_SHA" 2>/dev/null || echo "Tag already exists locally."
          git push origin "${{ steps.v.outputs.tag }}" 2>&1 || echo "Tag push failed or tag already on remote; continuing to publish release."

      - name: Build addon zip
        id: zip
        run: |
          set -euo pipefail
          mkdir -p .release
          out=".release/ArenaCoachTBC-${{ steps.v.outputs.tag }}.zip"
          # Zip only the addon dir; exclude Tests/ and dev-only files. The zip's
          # top-level entry must be the addon folder so WoW AddOns/ extraction works.
          zip -r "$out" ArenaCoachTBC \
            -x 'ArenaCoachTBC/Tests/*' \
            -x 'ArenaCoachTBC/Tests' \
            -x 'ArenaCoachTBC/.*' \
            -x '*.luacov.*'
          echo "Built: $out"
          ls -la .release/
          echo "path=$out" >> "$GITHUB_OUTPUT"

      - name: Run BigWigs packager (stable tag only - uploads to CurseForge / Wago)
        if: steps.v.outputs.kind == 'release'
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
        continue-on-error: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.v.outputs.tag }}
          name: ArenaCoachTBC ${{ steps.v.outputs.tag }}
          body_path: /tmp/notes.md
          prerelease: ${{ steps.v.outputs.prerelease == 'true' }}
          files: ${{ steps.zip.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
